<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Configuration du modèle</title>
	<style>
		:root {
			--btn-bg: #f3f4f6;          /* Gris très clair et doux */
			--btn-bg-hover: #e5e7eb;    /* Survol un poil plus sombre */
			--btn-border: #e5e7eb;      /* Bordure subtile */
			--btn-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
			--btn-shadow-hover: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
			--svg-color: #4b5563;       /* Couleur de l'icône (si SVG inline) */
			--svg-color-hover: #1f2937;
		}
		button.small {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			margin: 4px; 
			padding: 6px; 
			border: 1px solid var(--btn-border);
			border-radius: 6px; 
			background-color: var(--btn-bg);
			box-shadow: var(--btn-shadow);
			cursor: pointer;
			transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
		}

		button.small:hover, button.small:focus {
			outline: none; 
			background-color: var(--btn-bg-hover);
			border-color: transparent;
			box-shadow: var(--btn-shadow-hover);
		}

		button.small:active {
			transform: scale(0.95);
			box-shadow: var(--btn-shadow);
		}

		button.small img, button.small svg {
			width: 16px;
			height: 16px;
			display: block;
			transition: transform 0.2s ease;
		}

		button.small:hover img, button.small:hover svg {
			transform: scale(1.05);
		}
		body { font-family: sans-serif; padding: 20px; max-width: 600px; }
		textarea { width: 100%; height: 300px; font-family: monospace; }
		button { margin-top: 10px; padding: 8px 16px; background: #0076ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
		dialog::backdrop {background-color: black; opacity: 50%};
	</style>
</head>
<body>
	<h2>Modèles disponibles</h2>
	<button class="small" id="add-template" title="Ajouter ou importer un modèle"><img src="add.svg"></img></button>
	<table id="list-templates"><tbody></tbody></table>
	<dialog id="edit-template">
		<label for="name-input">Nom du modèle</label>
		<input type="text" id="name-input" name="name-input" />
		<br/>
		<label for="file-input">Collez votre CSS ci-dessous ou importez un fichier :</label>
		<input type="file" id="file-input" accept=".css"><br><br>
		<textarea id="css-code" placeholder="/* Entrez votre CSS ici... */"></textarea><br>
		<button id="save-btn">Sauvegarder</button>
		<button id="cancel-btn">Annuler</button>
	</dialog>

	<script src="select_css.js"></script>
</body>
</html>
