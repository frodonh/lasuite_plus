<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<script src="popup.js"></script>
	<style>
		ul {
		  list-style-type: none;
		  padding: 0;
		  margin: 0;
		  width: 250px;
		  background-color: #ffffff;
		}
		li {
		  margin: 4px 8px;
		}
		li a {
		  display: block;
		  padding: 10px 14px;
		  color: #2d3748;
		  text-decoration: none;
		  font-size: 14px;
		  font-weight: 500;
		  border-radius: 8px;
		  transition: all 0.2s ease-in-out;
		}
		li a:hover {
		  background-color: #f7fafc;
		  color: #3182ce;
		  padding-left: 18px;
		}
		li a:active {
		  background-color: #edf2f7;
		  transform: scale(0.98);
		}
	</style>
</head>
<body>
	<ul>
	</ul>
</body>
</html>
